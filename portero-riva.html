<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Años Riva — Control de acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f7fa;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .page { width: 100%; max-width: 480px; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #003865;
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }

  .header-logo {
    font-size: 28px;
    color: #fff;
    text-transform: lowercase;
  }

  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
  }

  .badge {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
  }

  .card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 10px;
    padding: 1rem;
    color: #aaa;
    border-bottom: 1px solid #eee;
  }

  #reader { width: 100%; min-height: 260px; }

  .scanner-hint {
    padding: 0.75rem;
    font-size: 12px;
    text-align: center;
    color: #ccc;
  }

  .manual-body { padding: 1rem; }

  .manual-row { display: flex; gap: 8px; }

  #manual-input {
    flex: 1;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 6px;
  }

  .validate-btn {
    padding: 0.75rem 1rem;
    background: #003865;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  #result-card { display: none; margin-bottom: 1rem; border-radius: 8px; }

  #result-card.visible { display: block; }

  #result-card.ok { background: #edf7f1; border: 1px solid #b3dfc4; }
  #result-card.fail { background: #fdf0f0; border: 1px solid #f0c0c0; }

  .result-inner { padding: 1.5rem; }

  .result-mark { font-size: 40px; }

  .reset-btn {
    width: 100%;
    margin-top: 1rem;
    padding: 0.75rem;
    border: 1px solid #ddd;
    background: transparent;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div>
      <div class="header-logo">riva</div>
      <div class="header-sub">Control de acceso</div>
    </div>
    <div class="badge">100 años</div>
  </div>

  <div class="card">
    <div class="card-label">Escáner de cámara</div>
    <div id="reader"></div>
    <div class="scanner-hint">Apuntá al QR</div>
  </div>

  <div class="card">
    <div class="card-label">Ingreso manual</div>
    <div class="manual-body">
      <div class="manual-row">
        <input id="manual-input" placeholder="Código" />
        <button class="validate-btn" id="btn-validate">OK</button>
      </div>
    </div>
  </div>

  <div id="result-card">
    <div class="result-inner">
      <div id="result-status"></div>
      <div id="result-name"></div>
      <div id="result-company"></div>
      <div id="result-msg"></div>
      <div class="result-mark" id="result-mark"></div>

      <button class="reset-btn" id="btn-reset">Escanear otro</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzp0L4r95aQWrXroaZnT5Hv-SaEZGlFqw4U17ssRuEXHlSBjpnyKRTHHdB6HgWAnfQk/exec";

let scanning = true;
let jsonpCounter = 0;

const scanner = new Html5Qrcode("reader");

scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 220 },
  onScanSuccess
).catch(err => {
  console.log(err);
});


// 🔥 FIX PRINCIPAL
function onScanSuccess(decodedText) {
  if (!scanning) return;

  scanning = false;

  const id = decodedText.trim().replace(/\s/g, "");

  console.log("QR detectado:", id);

  // 🔴 clave: cortar cámara ANTES de validar
  scanner.pause();

  validate(id);
}


// -------------------------
// VALIDACIÓN (JSONP)
// -------------------------
function jsonpRequest(params) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + jsonpCounter++;
    const script = document.createElement('script');

    window[callbackName] = (data) => {
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    const query = new URLSearchParams({
      ...params,
      callback: callbackName
    });

    script.src = SCRIPT_URL + "?" + query;

    script.onerror = reject;

    document.body.appendChild(script);
  });
}

async function validate(id) {
  try {
    const data = await jsonpRequest({
      action: "validate",
      id
    });

    showResult(data, id);

  } catch (e) {
    showResult({ ok: false, error: "Error de conexión" }, id);
  }
}


// -------------------------
// RESULTADO
// -------------------------
function showResult(data, id) {
  const card = document.getElementById("result-card");
  card.style.display = "block";
  card.className = "visible " + (data.ok ? "ok" : "fail");

  document.getElementById("result-status").textContent =
    data.ok ? "Acceso permitido" : "Acceso denegado";

  document.getElementById("result-name").textContent =
    data.nombre || id;

  document.getElementById("result-company").textContent =
    data.empresa || "";

  document.getElementById("result-mark").textContent =
    data.ok ? "✓" : "✕";

  document.getElementById("result-msg").textContent =
    data.ok ? "Ingreso autorizado" : (data.error || "Rechazado");

  setTimeout(() => {
    scanning = true;
  }, 2000);
}


// -------------------------
// RESET
// -------------------------
document.getElementById("btn-reset").addEventListener("click", async () => {
  document.getElementById("result-card").style.display = "none";
  scanning = true;

  try {
    await scanner.resume();
  } catch (e) {
    console.log(e);
  }
});

</script>

</body>
</html>
