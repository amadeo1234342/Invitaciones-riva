<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Años Riva — Control de acceso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 2rem 1rem;
    display: flex;
    justify-content: center;
  }

  .page { width: 100%; max-width: 480px; }

  .header {
    background: #003865;
    color: white;
    padding: 1rem;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .card {
    background: white;
    border-radius: 8px;
    border: 1px solid #e8e8e8;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .card-label {
    font-size: 10px;
    padding: 1rem;
    color: #aaa;
    border-bottom: 1px solid #eee;
  }

  #reader { width: 100%; min-height: 260px; }

  .manual {
    padding: 1rem;
    display: flex;
    gap: 8px;
  }

  input {
    flex: 1;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 6px;
  }

  button {
    padding: 0.75rem 1rem;
    background: #003865;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  #result {
    display: none;
    padding: 1rem;
  }

  .ok { color: green; }
  .fail { color: red; }
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div>riva</div>
    <div>100 años</div>
  </div>

  <div class="card">
    <div class="card-label">Escáner</div>
    <div id="reader"></div>
  </div>

  <div class="card">
    <div class="card-label">Manual</div>
    <div class="manual">
      <input id="manual-input" placeholder="Código">
      <button onclick="manualValidate()">OK</button>
    </div>
  </div>

  <div id="result"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzp0L4r95aQWrXroaZnT5Hv-SaEZGlFqw4U17ssRuEXHlSBjpnyKRTHHdB6HgWAnfQk/exec";

let locked = false;
let scanner;

function normalize(text) {
  return (text || "")
    .toString()
    .trim()
    .replace(/\s/g, "");
}

// ---------------- SCANNER ----------------

scanner = new Html5Qrcode("reader");

scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 220 },
  onScanSuccess
);

// 🔥 FUNCIÓN CLAVE CORREGIDA
function onScanSuccess(decodedText) {

  if (locked) return;
  locked = true;

  const id = normalize(decodedText);

  console.log("QR detectado:", JSON.stringify(id));

  // 🔴 cortar cámara correctamente
  scanner.clear().then(() => {
    validate(id);
  });

  setTimeout(() => {
    locked = false;
  }, 2000);
}

// ---------------- VALIDACIÓN ----------------

let jsonpCounter = 0;

function jsonpRequest(params) {
  return new Promise((resolve, reject) => {

    const cb = "cb_" + jsonpCounter++;
    const script = document.createElement("script");

    window[cb] = (data) => {
      resolve(data);
      delete window[cb];
      script.remove();
    };

    const query = new URLSearchParams({
      ...params,
      callback: cb
    });

    script.src = SCRIPT_URL + "?" + query;

    script.onerror = reject;

    document.body.appendChild(script);
  });
}

async function validate(id) {
  try {
    const res = await jsonpRequest({
      action: "validate",
      id
    });

    show(res, id);

  } catch (e) {
    show({ ok: false, error: "Error de conexión" }, id);
  }
}

// ---------------- MANUAL ----------------

function manualValidate() {
  const val = normalize(document.getElementById("manual-input").value);
  if (!val) return;
  validate(val);
}

// ---------------- RESULTADO ----------------

function show(data, id) {

  const el = document.getElementById("result");
  el.style.display = "block";

  if (data.ok) {
    el.innerHTML = `<div class="ok">✔ Acceso permitido<br>${data.nombre || id}</div>`;
  } else {
    el.innerHTML = `<div class="fail">✕ Acceso denegado<br>${data.error || "Desconocido"}</div>`;
  }
}

</script>

</body>
</html>
